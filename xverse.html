<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xverse Wallet Integration</title>
</head>
<body>
    <h1>Xverse Wallet Integration</h1>
    <button id="checkWallet">Check Xverse Wallet</button>
    <button id="sendTransaction">Send Transaction</button>
    <p id="status"></p>

    <script>
        // 检查 Xverse 钱包是否安装
        document.getElementById('checkWallet').addEventListener('click', async () => {
            if (window.XverseProvider) {
                document.getElementById('status').textContent = 'XverseProvider is installed.';
            } else {
                document.getElementById('status').textContent = 'XverseProvider is not installed.';
            }
        });

        // 发送交易的功能
        document.getElementById('sendTransaction').addEventListener('click', async () => {
            if (window.XverseProvider) {
                try {
                    // 获取用户地址
                    const accounts = await window.XverseProvider.request({ method: 'eth_requestAccounts' });
                    const fromAddress = accounts[0];

                    // 发送交易
                    const transactionHash = await window.XverseProvider.request({
                        method: 'eth_sendTransaction',
                        params: [{
                            from: fromAddress,
                            to: 'SP2VDFN6HACT6P551FN5ED79VK6JSEM5ACDMY308V', // 收款地址
                            value: '0xAmountInWei', // 发送金额（单位是 Wei）
                            gas: '0xGasLimit', // 例如 '0x5208'（21000 in decimal）
                            gasPrice: '0xGasPrice', // 例如 '0x3B9ACA00'（1 Gwei）
                        }],
                    });

                    document.getElementById('status').textContent = 'Transaction Hash: ' + transactionHash;
                } catch (error) {
                    console.error('Error sending transaction:', error);
                    document.getElementById('status').textContent = 'Error sending transaction: ' + error.message;
                }
            } else {
                document.getElementById('status').textContent = 'XverseProvider is not installed.';
            }
        });
    </script>
</body>
</html>
