<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xverse Wallet Integration</title>
</head>
<body>
    <h1>Xverse Wallet Integration</h1>
    <button id="checkWallet">Check Xverse Wallet</button>
    <button id="sendTransaction">Send Transaction</button>
    <p id="status"></p>

    <script>
        // 检查 Xverse 钱包是否安装
        document.getElementById('checkWallet').addEventListener('click', async () => {
            if (window.XverseProviders) {  // 使用 XverseProviders 而不是 XverseProvider
                document.getElementById('status').textContent = 'XverseProviders is installed.';
            } else {
                document.getElementById('status').textContent = 'XverseProviders is not installed.';
            }
        });

document.getElementById('getAccounts').addEventListener('click', async () => {
    try {
        const response = await window.XverseProviders.Wallet.request({
            method: 'stx_getAccounts',  // 获取 Stacks 账户
        });

        if (response.status === 'success') {
            console.log('User accounts:', response.result);  // 输出用户地址
            document.getElementById('status').textContent = 'User account: ' + response.result[0];  // 显示第一个账户
        } else {
            console.error('Error getting accounts:', response.error);
            document.getElementById('status').textContent = 'Error: ' + response.error.message;
        }
    } catch (error) {
        console.error('Error requesting accounts:', error);
        document.getElementById('status').textContent = 'Error requesting accounts: ' + error.message;
    }
});
    </script>
</body>
</html>
