<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xverse Wallet Integration</title>
</head>
<body>
    <h1>Xverse Wallet Integration</h1>
    <button id="checkWallet">Check Xverse Wallet</button>
    <button id="sendTransaction">Send Stacks Transaction</button>
    <p id="status"></p>

    <script>
        // 检查 Xverse 钱包是否安装
        document.getElementById('checkWallet').addEventListener('click', async () => {
            if (window.XverseProviders && window.XverseProviders.Wallet) {  // 确保 XverseProviders 和 Wallet 被正确注入
                document.getElementById('status').textContent = 'Xverse Wallet is installed.';
                console.log('Xverse Wallet object:', window.XverseProviders.Wallet);
            } else {
                document.getElementById('status').textContent = 'Xverse Wallet is not installed.';
            }
        });

        // 发送 Stacks 交易的功能
        document.getElementById('sendTransaction').addEventListener('click', async () => {
            if (window.XverseProviders && window.XverseProviders.Wallet) {  // 确保 XverseProviders 和 Wallet 被正确注入
                try {
                    // 使用 Wallet.request 请求用户 Stacks 账户
                    const accounts = await window.XverseProviders.Wallet.request({ method: 'stx_getAccounts' });
                    const fromAddress = accounts.result[0];  // 获取第一个账户

                    // 验证是否成功获取用户地址
                    if (!fromAddress) {
                        document.getElementById('status').textContent = 'Failed to retrieve user account.';
                        return;
                    }

                    // 定义交易参数
                    const transactionParams = {
                        from: fromAddress,
                        to: 'SP2VDFN6HACT6P551FN5ED79VK6JSEM5ACDMY308V',  // 修改为实际收款地址
                        amount: '1000',  // 发送金额（单位为 uSTX，即 0.001 STX）
                        fee: '100',  // 手续费（单位为 uSTX）
                        memo: 'Test transaction',  // 交易备注
                        nonce: 0  // 交易序列号
                    };

                    // 发送 Stacks 交易
                    const transactionResponse = await window.XverseProviders.Wallet.request({
                        method: 'stx_transferStx',
                        params: transactionParams
                    });

                    // 检查交易结果
                    if (transactionResponse.status === 'success') {
                        document.getElementById('status').textContent = 'Transaction Hash: ' + transactionResponse.result.txid;
                    } else {
                        document.getElementById('status').textContent = 'Error sending transaction: ' + transactionResponse.error.message;
                    }
                } catch (error) {
                    console.error('Error sending transaction:', error);
                    document.getElementById('status').textContent = 'Error sending transaction: ' + error.message;
                }
            } else {
                document.getElementById('status').textContent = 'Xverse Wallet is not installed.';
            }
        });
    </script>
</body>
</html>
